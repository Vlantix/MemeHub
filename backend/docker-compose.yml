# --------------------------------------------------
#
#   LOCAL POSTGRES SUPPORT: PLANNED, NOT YET WIRED UP
#   The app currently requires Supabase for DATABASE_URL,
#   SUPABASE_KEY, and SUPABASE_BUCKET (see Config.validate()).
#   This file is a starting point for a future local-only
#   dev mode. See Roadmap in the README.
#
# --------------------------------------------------
services:
  app:
    build: .
    container_name: flask-app
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      - db
    command: python3 app.py

  db:
    image: postgres:15-alpine
    container_name: postgres-db
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: